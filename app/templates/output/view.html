{% extends "base.html" %}
{% block title %}出力: {{ func.name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4><i class="bi bi-code-slash"></i> 生成コード: <code>{{ func.name }}</code></h4>
  <div class="d-flex gap-2">
    <a href="{{ url_for('output.download_python', function_id=func.id) }}" class="btn btn-sm btn-outline-primary">
      <i class="bi bi-download"></i> Python ダウンロード
    </a>
    <a href="{{ url_for('output.download_json', function_id=func.id) }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-download"></i> JSON ダウンロード
    </a>
    <a href="{{ url_for('editor.edit_function', function_id=func.id) }}" class="btn btn-sm btn-outline-warning">
      <i class="bi bi-pencil"></i> 関数編集
    </a>
  </div>
</div>

<ul class="nav nav-tabs mb-0" id="outputTabs">
  <li class="nav-item">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-python">
      <i class="bi bi-filetype-py"></i> Python コード
    </button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-json">
      <i class="bi bi-filetype-json"></i> Tools JSON
    </button>
  </li>
</ul>
<div class="tab-content border border-top-0 rounded-bottom p-3 bg-dark">
  <div class="tab-pane fade show active" id="tab-python">
    <div class="d-flex justify-content-end mb-1">
      <button class="btn btn-sm btn-outline-light" onclick="copyCode('py-code')">
        <i class="bi bi-clipboard"></i> コピー
      </button>
    </div>
    <pre class="code-block m-0" id="py-code">{{ py_code }}</pre>
  </div>
  <div class="tab-pane fade" id="tab-json">
    <div class="d-flex justify-content-end mb-1">
      <button class="btn btn-sm btn-outline-light" onclick="copyCode('json-code')">
        <i class="bi bi-clipboard"></i> コピー
      </button>
    </div>
    <pre class="code-block m-0" id="json-code">{{ json_str }}</pre>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function copyCode(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
}
</script>
{% endblock %}
